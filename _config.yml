####################################################
### Jekyll Configuration. No need to touch this. ###
####################################################

# Set the Sass partials directory, as we're using @imports
sass:
  style: :compressed # You might prefer to minify using :compressed

collections:
  pages:
    output: true
    permalink: /:path/

# Markdown rendering
markdown: kramdown

# Plugins (jekyll-sitemap + jekyll-seo-tag; both are GitHub Pages whitelisted)
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

exclude:
  - LICENSE
  - README.md
  - CNAME
  - node_modules
  - package.json
  - package-lock.json
  - scripts
  - Gemfile.local
  - Gemfile.local.lock
