# Feature List                            Edit, add or remove features to be presented.
features                                  :

  - title                                 : Price Scanner
    description                           : Point your phone at any Pokémon card. TCG Companion identifies it and shows the live market price in under a second — no typing, no set lists to scroll.
    fontawesome_icon_name                 : camera

  - title                                 : Live Market Prices
    description                           : Raw, graded, and sold prices pulled from real eBay listings. Refreshed daily, with price history charted over weeks and months.
    fontawesome_icon_name                 : chart-line

  - title                                 : Collection Tracking
    description                           : Every card you scan rolls up into a running collection value. Export to CSV, filter by rarity, and track gains over time.
    fontawesome_icon_name                 : layer-group

  - title                                 : eBay Sold Listings
    description                           : Every card links straight to live sold listings in your region so you can verify prices with real, recent sales before you buy or sell.
    fontawesome_icon_name                 : tag

  - title                                 : All English Sets
    description                           : From Base Set (1999) through the newest Scarlet & Violet releases — 178 sets, every card, every variant, every rarity.
    fontawesome_icon_name                 : layer-group

  - title                                 : Graded Card Support
    description                           : Filter prices by PSA 10, PSA 9, CGC and BGS so you see exactly what your condition is worth — not a misleading raw-card average.
    fontawesome_icon_name                 : award

